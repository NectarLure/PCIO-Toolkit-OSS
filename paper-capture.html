<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PCIO paper figure capture</title>
  <style>
    :root {
      --ink: #14283b;
      --teal: #08766d;
      --blue: #2d638d;
      --gold: #9a711d;
      --red: #a33b35;
      --line: #cfd9e1;
      --soft: #edf2f5;
      --paper: #ffffff;
      --muted: #5c6d7c;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      background: #e8edf1;
      color: var(--ink);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }
    .stage { position: relative; width: 100vw; height: 100vh; padding: 28px; }
    .frame-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; height: 100%; }
    .capture-panel {
      position: relative;
      overflow: hidden;
      background: #fff;
      border: 1px solid #aebbc5;
      box-shadow: 0 12px 30px rgba(20, 40, 59, .12);
    }
    .panel-label {
      position: absolute;
      z-index: 5;
      top: 12px;
      left: 12px;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--ink);
      color: white;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .18);
    }
    iframe { width: 100%; height: 100%; border: 0; background: white; }
    .figure-card {
      height: 100%;
      overflow: hidden;
      background: white;
      border: 1px solid #aebbc5;
      box-shadow: 0 12px 30px rgba(20, 40, 59, .12);
    }
    .paper-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      height: 100%;
    }
    .paper-page {
      overflow: hidden;
      padding: 34px 38px;
      background: white;
      border-top: 7px solid var(--teal);
      box-shadow: 0 10px 28px rgba(20, 40, 59, .14);
    }
    .paper-page.en { border-top-color: var(--blue); }
    .paper-kicker {
      margin-bottom: 8px;
      color: var(--teal);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .paper-page.en .paper-kicker { color: var(--blue); }
    h1 { margin: 0 0 8px; font-size: 27px; line-height: 1.2; }
    h2 { margin: 22px 0 8px; font-size: 18px; border-bottom: 2px solid var(--line); padding-bottom: 6px; }
    p { margin: 7px 0; font-size: 14px; line-height: 1.58; }
    .meta, .evidence {
      padding: 9px 11px;
      background: #f3f6f8;
      border-left: 4px solid var(--ink);
      font-size: 12px;
      line-height: 1.45;
    }
    .evidence { margin-top: 10px; border-left-color: var(--gold); background: #fff6dd; }
    table { width: 100%; border-collapse: collapse; margin: 8px 0 14px; font-size: 12px; }
    th, td { border: 1px solid var(--line); padding: 7px 8px; text-align: left; vertical-align: top; }
    th { background: var(--ink); color: #fff; }
    .route { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
    .route div { min-height: 105px; padding: 10px; border: 1px solid var(--line); background: #f7f9fa; }
    .route b { display: block; margin-bottom: 5px; color: var(--teal); font-size: 17px; }
    .route span { font-size: 11px; line-height: 1.4; }
    .workflow {
      height: 100%;
      overflow: hidden;
      padding: 28px 32px;
      background: white;
      border-top: 7px solid var(--teal);
      box-shadow: 0 12px 30px rgba(20, 40, 59, .12);
    }
    .workflow h1 { font-size: 25px; }
    .workflow-sub { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    .evidence-strip {
      display: grid;
      grid-template-columns: 1.2fr 1.7fr 1.2fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .evidence-box { padding: 10px 12px; border: 1px solid var(--line); background: #f5f8fa; }
    .evidence-box b { display: block; margin-bottom: 4px; font-size: 12px; color: var(--muted); }
    .evidence-box strong { font-size: 15px; }
    .pdca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pdca {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-top: 4px solid var(--teal);
      background: #fff;
    }
    .pdca.do { border-top-color: var(--blue); }
    .pdca.check { border-top-color: var(--gold); }
    .pdca.act { border-top-color: var(--red); }
    .pdca h2 { margin: 0 0 8px; padding: 0; border: 0; font-size: 18px; }
    .pdca ul { margin: 0; padding-left: 18px; }
    .pdca li { margin: 4px 0; font-size: 12px; line-height: 1.42; }
    .pcio-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .pcio-actions div { padding: 7px 8px; background: #f3f6f8; border-left: 3px solid var(--blue); font-size: 11px; line-height: 1.35; }
    .pcio-actions b { margin-right: 5px; }
    .summary-table { margin-top: 13px; }
    .summary-table h2 { margin: 0 0 7px; padding: 0; border: 0; font-size: 17px; }
    .summary-table table { margin: 0; font-size: 11px; }
    .note-line { margin-top: 7px; color: var(--muted); font-size: 10px; }
  </style>
</head>
<body>
  <main id="stage" class="stage"></main>
  <script>
    const params = new URLSearchParams(location.search);
    const figure = params.get("figure") || "3";
    const stage = document.getElementById("stage");
    const profile = {
      project_code: "CHEM-PILOT-01",
      company_name: "Anonymous Process-Manufacturing SME",
      company_size: "medium",
      employee_count: 286,
      industry: "chemical",
      production_type: "batch_process",
      line_name: "Reactor and evaporation process",
      region: "Demonstration region",
      pain_points: ["process_variation", "energy_cost", "equipment_downtime"],
      current_systems: ["excel", "plc", "dcs", "scada_hmi"],
      automation_level: "local",
      pilot_scope: "One reactor train, one evaporation unit, and one operating shift",
      profile_owner: "Production digitalisation lead"
    };

    function addFrame(container, label) {
      const panel = document.createElement("div");
      panel.className = "capture-panel";
      if (label) panel.innerHTML = `<span class="panel-label">${label}</span>`;
      const frame = document.createElement("iframe");
      frame.src = "index.html";
      panel.appendChild(frame);
      container.appendChild(panel);
      return frame;
    }

    function injectCaptureStyles(doc, zoom = .78) {
      const style = doc.createElement("style");
      style.textContent = `
        .site-header,.hero,.trust-strip,.privacy-notice,.workspace-heading,.site-footer{display:none!important}
        html{scroll-behavior:auto!important}
        body{background:#fff!important;zoom:${zoom}}
        .shell{max-width:none!important;margin:0!important;padding:18px 22px 50px!important}
        .workspace{margin:0!important}
        .tabs{display:none!important}
        .panel{box-shadow:none!important;border-top:1px solid var(--line)!important}
        .loading-overlay{display:none!important}
      `;
      doc.head.appendChild(style);
    }

    function setInput(doc, id, value) {
      const el = doc.getElementById(id);
      if (!el) return;
      if (el.multiple) {
        const values = new Set(Array.isArray(value) ? value : [value]);
        [...el.options].forEach(option => option.selected = values.has(option.value));
      } else {
        el.value = value;
      }
      el.dispatchEvent(new Event("input", { bubbles: true }));
      el.dispatchEvent(new Event("change", { bubbles: true }));
    }

    function populateProfile(doc) {
      Object.entries(profile).forEach(([key, value]) => setInput(doc, `profile_${key}`, value));
    }

    function prepareFrame(frame, mode, zoom, targetId) {
      frame.addEventListener("load", () => {
        const w = frame.contentWindow;
        const doc = frame.contentDocument;
        injectCaptureStyles(doc, zoom);
        w.setLang("en");
        w.saveProfile(profile);
        if (mode === "profile") {
          w.activatePanel("profile", false);
          populateProfile(doc);
        } else if (mode === "survey") {
          w.renderSurvey(profile);
          w.activatePanel("survey", false);
          setInput(doc, "respondent_role", "process");
          setInput(doc, "respondent_department", "Reaction and evaporation");
          setInput(doc, "respondent_shift", "rotating");
          setInput(doc, "respondent_years_experience", "8");
          setInput(doc, "respondent_digital_tool_frequency", "daily");
        } else {
          w.activatePanel("analysis", false);
          w.loadStaticDemo();
        }
        window.setTimeout(() => {
          if (targetId) {
            const target = doc.getElementById(targetId);
            if (target) {
              const renderedTop = target.getBoundingClientRect().top + w.scrollY;
              w.scrollTo(0, Math.max(0, renderedTop - 10));
            }
          } else {
            w.scrollTo(0, 0);
          }
          document.documentElement.dataset.ready = "true";
        }, 500);
      }, { once: true });
    }

    function renderFigure3() {
      const grid = document.createElement("div");
      grid.className = "frame-grid";
      stage.appendChild(grid);
      const a = addFrame(grid, "a");
      const b = addFrame(grid, "b");
      prepareFrame(a, "profile", .69);
      prepareFrame(b, "survey", .66);
    }

    function renderFrameFigure(targetId, zoom) {
      stage.innerHTML = '<div class="figure-card" id="single"></div>';
      const frame = document.createElement("iframe");
      document.getElementById("single").appendChild(frame);
      frame.src = "index.html";
      prepareFrame(frame, "analysis", zoom, targetId);
    }

    function renderFigure6() {
      stage.innerHTML = `
        <div class="paper-wrap">
          <article class="paper-page">
            <div class="paper-kicker">PCIO 个性化案例报告 | 合成案例演示数据</div>
            <h1>匿名流程制造企业 PCIO 实施案例分析报告</h1>
            <div class="meta"><b>项目代码：</b>CHEM-PILOT-01　 <b>有效样本：</b>n=60　 <b>分析版本：</b>3.0.0</div>
            <div class="evidence">证据边界：问卷结果为合成演示数据；±0.5℃、蒸汽节省15.3%、装卸时间减少29%及外部n=52结果仅供参考，不构成效果承诺。</div>
            <h2>1. 执行摘要</h2>
            <p>该企业为中型化工制造企业，本次诊断聚焦反应与蒸发工序。四层平均成熟度处于“局部分散”至“发展中”区间，集成层为首要瓶颈（2.85/5），连接层相对较高（3.28/5）。建议先完成测点、连接和数据语义治理，再进入高级优化。</p>
            <h2>2. 当前状态与差距</h2>
            <table>
              <tr><th>层级</th><th>当前均值</th><th>目标参考</th><th>差距</th></tr>
              <tr><td>P 感知</td><td>2.91</td><td>4.20</td><td>1.29</td></tr>
              <tr><td>C 连接</td><td>3.28</td><td>4.20</td><td>0.92</td></tr>
              <tr><td>I 集成</td><td>2.85</td><td>4.20</td><td>1.35</td></tr>
              <tr><td>O 优化</td><td>2.86</td><td>4.20</td><td>1.34</td></tr>
            </table>
            <h2>3. 模块化实施路径</h2>
            <div class="route">
              <div><b>P</b><span>盘点关键温度、压力、流量、液位和蒸汽测点；记录校准、缺失与责任人。</span></div>
              <div><b>C</b><span>建立一条设备至看板的数据链，验证断线、延迟、缓存与恢复能力。</span></div>
              <div><b>I</b><span>统一设备、批次、工单、异常及KPI字典，形成可追溯映射。</span></div>
              <div><b>O</b><span>先用趋势、SPC和规则报警验证问题，再评估预测模型或MPC。</span></div>
            </div>
          </article>
          <article class="paper-page en">
            <div class="paper-kicker">PCIO personalised case report | Synthetic demonstration data</div>
            <h1>PCIO Implementation Case Analysis for an Anonymous Process-Manufacturing SME</h1>
            <div class="meta"><b>Project:</b> CHEM-PILOT-01　 <b>Valid responses:</b> n=60　 <b>Version:</b> 3.0.0</div>
            <div class="evidence">Evidence boundary: Survey results are synthetic demonstration data. ±0.5°C, 15.3% steam saving, 29% loading-time reduction, and the external n=52 finding are references only.</div>
            <h2>1. Executive summary</h2>
            <p>The diagnosis covers a medium-sized chemical manufacturer and focuses on reactor and evaporation operations. Integration is the primary bottleneck (2.85/5), while Connectivity is relatively stronger (3.28/5). Measurement, connectivity, and data-context gaps should be closed before advanced optimisation.</p>
            <h2>2. Current state and gap</h2>
            <table>
              <tr><th>Layer</th><th>Current</th><th>Target</th><th>Gap</th></tr>
              <tr><td>P Perception</td><td>2.91</td><td>4.20</td><td>1.29</td></tr>
              <tr><td>C Connectivity</td><td>3.28</td><td>4.20</td><td>0.92</td></tr>
              <tr><td>I Integration</td><td>2.85</td><td>4.20</td><td>1.35</td></tr>
              <tr><td>O Optimisation</td><td>2.86</td><td>4.20</td><td>1.34</td></tr>
            </table>
            <h2>3. Modular implementation route</h2>
            <div class="route">
              <div><b>P</b><span>Audit critical temperature, pressure, flow, level, and steam tags; record calibration and ownership.</span></div>
              <div><b>C</b><span>Validate one asset-to-dashboard path, including disconnects, latency, buffering, and recovery.</span></div>
              <div><b>I</b><span>Standardise asset, batch, work-order, exception, and KPI dictionaries with traceable mappings.</span></div>
              <div><b>O</b><span>Validate recurring problems with trends, SPC, and rules before predictive models or MPC.</span></div>
            </div>
          </article>
        </div>`;
      document.documentElement.dataset.ready = "true";
    }

    function renderFigure7() {
      stage.innerHTML = `
        <section class="workflow">
          <h1>Enterprise Improvement Workflow Based on the Current PCIO Analysis</h1>
          <p class="workflow-sub">Six-month PDCA output generated from the static-site synthetic demonstration dataset. All numerical values are planning references only.</p>
          <div class="evidence-strip">
            <div class="evidence-box"><b>Diagnostic scores (1–5)</b><strong>P 2.8420 · C 2.8891 · I 2.6359 · O 2.4272 · H 2.6851</strong></div>
            <div class="evidence-box"><b>Risk register</b><strong>H01=16 · H02=16 · O02=16 · T01=16 · T02=12 · E01=9 · E02=9 · O01=9</strong></div>
            <div class="evidence-box"><b>ROI scenarios</b><strong>7.5% / 26.7 mo / 35% · 9.3% / 20.3 mo / 77% · 11.0% / 16.4 mo / 119%</strong></div>
          </div>
          <div class="pdca-grid">
            <article class="pdca plan">
              <h2>Plan</h2>
              <ul>
                <li>Treat 12–16 point risks immediately; place 8–11 point risks in wave two and monitor scores of 7 or below.</li>
                <li>Limit the pilot to one representative cell, one shift team, and three to five critical assets for 8–12 weeks.</li>
                <li>Allocate first-wave effort approximately P 40%, C 25%, I 20%, and O 15%; budget training and cybersecurity separately.</li>
                <li>Define each KPI by source, formula, owner, frequency, baseline, month-3 gate, and month-6 target.</li>
                <li>Use the conservative ROI case (7.5%, 26.7 months, 35% three-year ROI) as the scaling gate.</li>
              </ul>
            </article>
            <article class="pdca do">
              <h2>Do: PCIO actions</h2>
              <div class="pcio-actions">
                <div><b>P</b>Inventory and calibrate critical tags; add low-cost sensing only for verified gaps; enforce missing, frozen, drift, and timestamp rules.</div>
                <div><b>C</b>Map network paths; measure availability, latency, loss, and recovery; configure edge buffering and store-and-forward.</div>
                <div><b>I</b>Standardise asset, tag, work-order, batch, unit, and status codes; build mappings and role-based shared dashboards.</div>
                <div><b>O</b>Run weekly Pareto analysis; use thresholds and SPC first; retain human confirmation, approval, and rollback.</div>
                <div><b>H</b>Deliver role-based training, remove duplicate recording, and define cross-shift ownership for exceptions and data quality.</div>
                <div><b>Gate</b>Do not deploy advanced optimisation until P/C/I data-quality, connectivity, and semantic gates are evidenced.</div>
              </div>
            </article>
            <article class="pdca check">
              <h2>Check</h2>
              <ul>
                <li><b>Weekly, weeks 1–12:</b> missing/frozen data, disconnects, alerts, exception closure, training participation, and experiment deviations.</li>
                <li><b>Month 3, first full retest:</b> repeat the same instrument and scoring rules; review all risk scores, PCIO/H scores, KPI gaps, actual net benefit, and response quality.</li>
                <li><b>Month-3 gate:</b> reduce 12–16 point risks by at least four points or one band; improve priority maturity scores by at least 0.20/5.</li>
                <li><b>Month 6, second review:</b> confirm sustained KPI gains, cross-shift consistency, risks at 7 or below, and support for the 9.3% base ROI case.</li>
              </ul>
            </article>
            <article class="pdca act">
              <h2>Act</h2>
              <ul>
                <li>If gates are met, standardise tags, interfaces, alerts, exception closure, and responsibilities in SOPs; replicate to one adjacent line only.</li>
                <li>If partially met, correct sensor placement, sampling, interfaces, training, workload, or ownership and retest.</li>
                <li>If risks rise, stop scaling, execute safe rollback, remove ineffective actions, and recalculate cost and ROI.</li>
                <li>Convert the month-6 evidence into the next Plan by updating risks, KPI targets, resources, and pilot boundaries.</li>
              </ul>
            </article>
          </div>
          <div class="summary-table">
            <h2>Top five actions and retest milestones</h2>
            <table>
              <tr><th>Priority</th><th>PCIO</th><th>Action</th><th>Expected effect</th><th>Retest</th></tr>
              <tr><td>1</td><td>H/O</td><td>Define approval, accountability, alarm, and rollback rules.</td><td>H01/H02/O02: 16 → ≤7 or −4 points</td><td>Month 3; month 6</td></tr>
              <tr><td>2</td><td>P</td><td>Complete tag inventory, calibration, and data-quality controls.</td><td>T01: 16 → ≤7; valid coverage → 90–95%</td><td>Weekly; month 3</td></tr>
              <tr><td>3</td><td>C</td><td>Stabilise collection links and edge recovery.</td><td>T02: 12 → ≤7; acquisition availability → 97–99%</td><td>Weekly; month 3</td></tr>
              <tr><td>4</td><td>I</td><td>Standardise identifiers and exception workflows.</td><td>Traceable tag/asset/order mapping → 90–95%</td><td>Month 3; month 6</td></tr>
              <tr><td>5</td><td>O</td><td>Validate rules and SPC before predictive optimisation.</td><td>Exception closure → 80–90%; auditable benefit evidence</td><td>Month 6</td></tr>
            </table>
          </div>
          <p class="note-line">Synthetic demonstration output; not a safety conclusion, procurement quotation, or guaranteed financial result.</p>
        </section>`;
      document.documentElement.dataset.ready = "true";
    }

    if (figure === "3") renderFigure3();
    else if (figure === "4") renderFrameFigure("analysisMetrics", .76);
    else if (figure === "5") renderFrameFigure("analysisRiskMatrix", .79);
    else if (figure === "6") renderFigure6();
    else if (figure === "7") renderFigure7();
  </script>
</body>
</html>
